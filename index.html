  const hasFilter=!!(fromVal||toVal);
  const fromDate=fromVal?parseDateStr(fromVal):new Date(0);
  const toDate=toVal?parseDateStr(toVal):new Date(9999,11,31);
  const previewed=allActive.filter(o=>{
    if(!o.date) return !hasFilter;
    const d=parseDateStr(o.date);
    return d>=fromDate && d<=toDate;
  });

  // Meses disponíveis nos pedidos
  const months=[...new Set(allActive.map(o=>o.month).filter(Boolean))].sort((a,b)=>{
    const p=s=>{const q=s.split('/');return new Date(q[1],q[0]-1);};
    return p(a)-p(b);
  });

  return`<div class="modal-overlay" data-close="overlay"><div class="modal">
    <div class="modal-title">📄 Exportar relatório</div>
    <div class="modal-sub">Selecione o período — deixe em branco para incluir todos os pedidos</div>

    <!-- Atalhos de período -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      <button class="btn btn-sm btn-outline" data-act="pdf-period-all">Todos</button>
      <button class="btn btn-sm btn-outline" data-act="pdf-period-month-${thisMonth}">Este mês (${thisMonth})</button>
      ${lastMonth!==thisMonth?`<button class="btn btn-sm btn-outline" data-act="pdf-period-month-${lastMonth}">Mês anterior (${lastMonth})</button>`:''}
      ${months.filter(m=>m!==thisMonth&&m!==lastMonth).map(m=>`<button class="btn btn-sm btn-outline" data-act="pdf-period-month-${m}">${m}</button>`).join('')}
    </div>

    <!-- Período manual -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="fg" style="margin-bottom:0"><label class="fl">Data inicial (opcional)</label>
        <input class="fi" type="date" id="pdf-from" value="${dateToInput(fromVal)}" placeholder="dd/mm/aaaa"/>
      </div>
      <div class="fg" style="margin-bottom:0"><label class="fl">Data final (opcional)</label>
        <input class="fi" type="date" id="pdf-to" value="${dateToInput(toVal)}" placeholder="dd/mm/aaaa"/>
      </div>
    </div>

    <!-- Preview -->
    <div style="background:var(--cream2);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:13px">
      <div style="font-weight:700;margin-bottom:6px;color:var(--ink)">📊 Pedidos que serão incluídos</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <span>📋 <b>${previewed.length}</b> pedidos</span>
        <span>☀️ <b>${previewed.filter(o=>o.meal==='Almoço').length}</b> almoços</span>
        <span>🌙 <b>${previewed.filter(o=>o.meal==='Jantar').length}</b> jantares</span>
        ${!fromVal&&!toVal?'<span style="color:var(--ink3);font-size:11px">(todos os períodos)</span>':''}
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-primary" style="flex:1" data-act="download-pdf">📥 Gerar PDF</button>
      <button class="btn btn-outline" data-close="overlay">Cancelar</button>
    </div>
  </div></div>`;
}

// ═══ BIND EVENTS ═══
function bindEvents(){
  // Overlay close — usa capture:false para não interferir com botões internos
  document.querySelectorAll('[data-close="overlay"]').forEach(el=>{
    el.addEventListener('click',e=>{
      // Só fecha se clicou EXATAMENTE no backdrop ou num botão que TEM data-close
      if(e.target===el||(e.target.tagName==='BUTTON'&&e.target.dataset.close==='overlay')){
        S.overlay=null;render();
      }
    });
  });
  // Botões do modal retroativo — registrados ANTES do data-act para ter prioridade
  const btnLancar=document.getElementById('btn-lancar-retro');
  if(btnLancar){
    btnLancar.addEventListener('click',e=>{
      e.stopImmediatePropagation();
      e.stopPropagation();
      e.preventDefault();
      confirmarRetro();
    });
  }
  const btnCancelarRetro=document.getElementById('btn-cancelar-retro');
  if(btnCancelarRetro){
    btnCancelarRetro.addEventListener('click',e=>{
      e.stopImmediatePropagation();
      e.stopPropagation();
      S.overlay=null;render();
    });
  }
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();act(el.dataset.act);});
  });
  document.querySelectorAll('[data-atab]').forEach(el=>el.addEventListener('click',()=>{S.atab=el.dataset.atab;if(S.atab!=='chats')S.threadUid=null;closeSidebar();render();}));
  document.querySelectorAll('[data-ptab]').forEach(el=>el.addEventListener('click',()=>{S.portalTab=el.dataset.ptab;S.adminPassErr=false;render();}));
  document.querySelectorAll('[data-meal]').forEach(el=>el.addEventListener('click',()=>{S.meal=el.dataset.meal;render();}));
  document.querySelectorAll('[data-day]').forEach(el=>el.addEventListener('click',()=>{S.day=parseInt(el.dataset.day);render();}));
  document.querySelectorAll('[data-item]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.item;if(S.sel.has(id))S.sel.delete(id);else S.sel.add(id);render();}));
  document.querySelectorAll('[data-color]').forEach(el=>el.addEventListener('click',()=>{S.obColor=el.dataset.color;render();}));
  document.querySelectorAll('[data-avulsmeal]').forEach(el=>el.addEventListener('click',()=>{S.avulsoMeal=el.dataset.avulsmeal;S.avulsoSel=new Set();render();}));
  document.querySelectorAll('[data-avulsday]').forEach(el=>el.addEventListener('click',()=>{S.avulsoDay=parseInt(el.dataset.avulsday);S.avulsoSel=new Set();render();}));
  document.querySelectorAll('[data-avulsoitem]').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.avulsoitem;
    if(S.avulsoSel.has(id))S.avulsoSel.delete(id);else S.avulsoSel.add(id);
    render();
  }));
  // Botão confirmar retroativo — listener direto como failsafe
  const btnRetro=document.getElementById('btn-confirm-retro');
  if(btnRetro){
    btnRetro.onclick=null; // remove inline onclick
    btnRetro.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();act('confirm-retro');});
  }
  // PDF date inputs
  const pdfFrom=document.getElementById('pdf-from');
  const pdfTo=document.getElementById('pdf-to');
  if(pdfFrom) pdfFrom.addEventListener('change',e=>{S.pdfDateFrom=inputValToDateStr(e.target.value);render();});
  if(pdfTo)   pdfTo.addEventListener('change',e=>{S.pdfDateTo=inputValToDateStr(e.target.value);render();});
  // Avulso fields
  const an=document.getElementById('avulso-name');
  if(an) an.addEventListener('input',e=>{S.avulsoName=e.target.value;});
  const ac=document.getElementById('avulso-company');
  if(ac) ac.addEventListener('change',e=>{S.avulsoCompanyId=e.target.value;});
  const ao=document.getElementById('avulso-obs');
  if(ao) ao.addEventListener('input',e=>{S.avulsoObs=e.target.value;});
  const ad=document.getElementById('avulso-date');
  if(ad) ad.addEventListener('change',e=>{S.avulsoDate=e.target.value;});
  const am=document.getElementById('avulso-items-manual');
  if(am) am.addEventListener('input',e=>{S.avulsoItemsManual=e.target.value;});
  document.querySelectorAll('[data-resumoview]').forEach(el=>el.addEventListener('click',()=>{S.resumoView=el.dataset.resumoview;render();}));
  document.querySelectorAll('[data-resumoday]').forEach(el=>el.addEventListener('click',()=>{S.resumoDay=parseInt(el.dataset.resumoday);render();}));
  document.querySelectorAll('[data-resumodate]').forEach(el=>el.addEventListener('click',()=>{S.resumoDate=el.dataset.resumodate;render();}));
  const rd=document.getElementById('retro-date');
  if(rd) rd.addEventListener('change',e=>{S.retroDate=e.target.value;});
  document.querySelectorAll('.retro-input').forEach(el=>{
    el.addEventListener('input',e=>{
      const idx=parseInt(el.dataset.retroidx);
      const meal=el.dataset.retromeal;
      if(!S.retroRows[idx]) S.retroRows[idx]={almoco:0,jantar:0};
      S.retroRows[idx][meal]=parseInt(e.target.value)||0;
      // Atualiza total da linha sem re-render completo
      const row=el.closest('tr');
      if(row){
        const a=parseInt(S.retroRows[idx].almoco)||0;
        const j=parseInt(S.retroRows[idx].jantar)||0;
        const tot=row.querySelector('td:last-child');
        if(tot) tot.textContent=(a+j)||'—';
        // Atualiza botão de confirmar
        const totGeral=S.retroRows.reduce((s,r)=>s+(parseInt(r?.almoco)||0)+(parseInt(r?.jantar)||0),0);
        const btn=document.querySelector('[data-act="confirm-retro"]');
        if(btn) btn.textContent=`✓ Lançar ${totGeral>0?totGeral+' refeições':''}`;
      }
    });
  });
  const omf=document.getElementById('orders-month-filter');
  if(omf) omf.addEventListener('change',e=>{S.ordersMonth=e.target.value;render();});
  document.querySelectorAll('[data-adminday]').forEach(el=>el.addEventListener('click',()=>{S.adminMenuDay=parseInt(el.dataset.adminday);render();}));
  document.querySelectorAll('[data-rmitem]').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.rmitem;
    const d=S.adminMenuDay;
    if(S.menu[S.meal]?.[d]){
      Object.keys(S.menu[S.meal][d]).forEach(c=>{S.menu[S.meal][d][c]=S.menu[S.meal][d][c].filter(i=>i.id!==id);});
    }
    if(db&&rid())fSet(`mh/${rid()}/menu/data`,S.menu);
    render();
  }));
  document.querySelectorAll('[data-restid]').forEach(el=>el.addEventListener('click',()=>{
    S.loginSelected={id:el.dataset.restid,name:el.dataset.restname,color:el.dataset.restcolor,slogan:el.dataset.restslogan};render();
  }));
  // Inputs
  const bind=(id,k,cb)=>{const el=document.getElementById(id);if(el){el.addEventListener('input',e=>{S[k]=e.target.value;if(cb)cb(e);});if(id==='admin-pass'||id==='login-code'||id==='login-name')setTimeout(()=>el.focus(),50);}};
  bind('ob-name','obName');bind('ob-slogan','obSlogan');
  bind('cn','confirmName');
  const cobs=document.getElementById('cobs');if(cobs)cobs.addEventListener('input',e=>{S.confirmObs=e.target.value;});
  const lq=document.getElementById('login-query');
  if(lq){lq.addEventListener('input',e=>{S.loginQuery=e.target.value;searchRestaurants(e.target.value);});setTimeout(()=>lq.focus(),50);}
  bind('login-name','loginName');
  const lcode=document.getElementById('login-code');
  if(lcode){lcode.addEventListener('input',e=>{S.loginCode=e.target.value;});setTimeout(()=>lcode.focus(),50);lcode.addEventListener('keydown',e=>{if(e.key==='Enter')act('submit-access');});}
  const ap=document.getElementById('admin-pass');
  if(ap){setTimeout(()=>ap.focus(),50);ap.addEventListener('keydown',e=>{if(e.key==='Enter')act('admin-submit');});}
  // Logo upload — Restaurante (settings)
  const restLogoInput=document.getElementById('rest-logo-input');
  if(restLogoInput){
    restLogoInput.addEventListener('change',e=>{
      const file=e.target.files?.[0];if(!file)return;
      if(file.size>2*1024*1024){alert('Logo muito grande. Use uma imagem menor que 2MB.');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        if(!S.rest)return;
        S.rest.logo=ev.target.result;
        localStorage.setItem('mh_rest',JSON.stringify(S.rest));
        if(db&&rid())fSet(`mh/${rid()}/config/main`,{...S.rest});
        const prev=document.getElementById('rest-logo-preview');
        if(prev)prev.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`;
      };
      reader.readAsDataURL(file);
    });
  }
  // Logo upload — Restaurante (onboarding)
  const obLogoInput=document.getElementById('ob-logo-input');
  if(obLogoInput){
    obLogoInput.addEventListener('change',e=>{
      const file=e.target.files?.[0];if(!file)return;
      if(file.size>2*1024*1024){alert('Logo muito grande. Use uma imagem menor que 2MB.');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        S.obLogo=ev.target.result;
        const prev=document.getElementById('ob-logo-preview');
        if(prev)prev.innerHTML=`<img src="${S.obLogo}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`;
      };
      reader.readAsDataURL(file);
    });
  }
  // Logo upload — Add company
  const coLogoInput=document.getElementById('co-logo-input');
  if(coLogoInput){
    coLogoInput.addEventListener('change',e=>{
      const file=e.target.files?.[0];if(!file)return;
      if(file.size>2*1024*1024){alert('Logo muito grande. Use uma imagem menor que 2MB.');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        S.newCoLogo=ev.target.result;
        const prev=document.getElementById('co-logo-preview');
        if(prev)prev.innerHTML=`<img src="${S.newCoLogo}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`;
      };
      reader.readAsDataURL(file);
    });
  }
  // Logo upload — Edit company
  const ecoLogoInput=document.getElementById('eco-logo-input');
  if(ecoLogoInput){
    ecoLogoInput.addEventListener('change',e=>{
      const file=e.target.files?.[0];if(!file)return;
      if(file.size>2*1024*1024){alert('Logo muito grande. Use uma imagem menor que 2MB.');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        const co=S.companies.find(c=>c.id===S.editCoId);
        if(co){co.logo=ev.target.result;}
        const prev=document.getElementById('eco-logo-preview');
        if(prev)prev.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`;
      };
      reader.readAsDataURL(file);
    });
  }
  const coname=document.getElementById('co-name'),cocode=document.getElementById('co-code');
  if(coname)coname.addEventListener('input',e=>{S.newCoName=e.target.value;if(cocode&&!cocode._edited){cocode.value=genCode(e.target.value);S.newCoCode=cocode.value;}});
  if(cocode)cocode.addEventListener('input',e=>{cocode._edited=true;S.newCoCode=e.target.value.toUpperCase();cocode.value=S.newCoCode;});
  const ci=document.getElementById('chat-input'),bs=document.getElementById('btn-csend');
  if(ci){ci.addEventListener('input',e=>{S.chatInput=e.target.value;});ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();act('send-chat');}});}
  if(bs)bs.addEventListener('click',()=>act('send-chat'));

  // Close notif panel on outside click - use single listener guard
  if(S.showNotifPanel && !window._notifListenerActive){
    window._notifListenerActive = true;

      function closeNotif(e){
        if(!e.target.closest('.notif-panel')&&!e.target.closest('#notif-bell')){
          S.showNotifPanel=false;window._notifListenerActive=false;

        }

      document.addEventListener('click',closeNotif);
    },50);
  }
}

// ═══ RESTAURANT SEARCH ═══
function searchRestaurants(q){
  const term=(q||'').trim().toLowerCase();

  // Always start with the locally-known restaurant (loaded from localStorage or Firebase)
  const localResults=[];
  if(S.rest && S.rest.name){
    if(!term || S.rest.name.toLowerCase().includes(term)){
      localResults.push(S.rest);
    }
  }

  // If we already have a result, show it immediately
  if(localResults.length){
    S.loginResults=localResults;render();
  }

  // If no term, nothing more to do
  if(!term){S.loginResults=localResults;render();return;}

  if(!db){S.loginResults=localResults;render();return;}

  // Try to fetch the main restaurant config from Firebase directly
  // This works even without indexes — we just fetch the known doc and check the name
  db.doc(`mh/${RESTAURANT_ID}/config/main`).get().then(doc=>{
    if(!doc.exists){S.loginResults=localResults;render();return;}
    const data=doc.data();
    const rname=(data.name||'').toLowerCase();
    if(!term || rname.includes(term)){
      const found={id:RESTAURANT_ID,...data};
      // Merge with localResults deduplicating by id
      const merged=[...new Map([...localResults,found].map(r=>[r.id,r])).values()];
      S.loginResults=merged;
    } else {
      S.loginResults=localResults;
    }
    render();
  }).catch(()=>{S.loginResults=localResults;render();});
}

// Called when user opens the portal — pre-load the restaurant so it shows without typing
function preloadRestaurant(){
  if(db){
    db.doc(`mh/${RESTAURANT_ID}/config/main`).get().then(doc=>{
      if(doc.exists){
        const r={id:RESTAURANT_ID,...doc.data()};
        S.rest=r;
        localStorage.setItem('mh_rest',JSON.stringify(r));
        // If search is still empty, show restaurant immediately
        if(!S.loginQuery){
          S.loginResults=[r];
        }
        render();
      }
    }).catch(()=>{
      // Fallback to local state
      if(S.rest && !S.loginQuery) S.loginResults=[S.rest];
      render();
    });
  } else if(S.rest && !S.loginQuery){
    S.loginResults=[S.rest];
    render();
  }
}

// ═══ ACTIONS ═══
function act(a){
  if(a==='go-landing'){S.screen='landing';render();}
  else if(a==='go-portal-user'){
    S.screen='portal';S.portalTab='user';S.loginStep='search';
    S.loginQuery='';S.loginResults=[];S.loginSelected=null;S.loginErr='';
    render();
    preloadRestaurant();
  }
  else if(a==='go-portal-admin'){S.screen='portal';S.portalTab='admin';S.adminPassErr=false;render();}
  else if(a==='go-onboard'){S.obStep=1;S.obLogo=null;S.screen='onboard';render();}
  else if(a==='toggle-notif'){S.showNotifPanel=!S.showNotifPanel;S.unreadNotifs=0;render();}
  else if(a==='mark-all-read'){S.unreadNotifs=0;S.showNotifPanel=false;render();}
  else if(a.startsWith('view-notif-order-')){
    const id=a.replace('view-notif-order-','');
    S.viewOrderId=id;S.overlay='order-detail';S.showNotifPanel=false;
    const o=S.orders.find(x=>x.id===id);if(o)o.isNew=false;
    render();
  }
  else if(a==='load-restaurants'){
    // Force load all known restaurants
    if(db){
      db.doc(`mh/${RESTAURANT_ID}/config/main`).get().then(doc=>{
        if(doc.exists){
          const r={id:RESTAURANT_ID,...doc.data()};
          S.rest=r;localStorage.setItem('mh_rest',JSON.stringify(r));
          S.loginResults=[r];render();
        } else {
          S.loginErr='Nenhum restaurante configurado ainda.';render();
        }
      }).catch(()=>{S.loginErr='Erro ao buscar restaurantes. Verifique sua conexão.';render();});
    } else if(S.rest){
      S.loginResults=[S.rest];render();
    } else {
      S.loginErr='Sem conexão com o servidor.';render();
    }
  }
  // Portal / login
  else if(a==='check-restaurant'){
    // Auto-select if only one result available
    if(!S.loginSelected){
      if(S.loginResults.length===1){
        S.loginSelected=S.loginResults[0];
      } else if(S.rest && (!S.loginQuery || S.rest.name.toLowerCase().includes(S.loginQuery.toLowerCase()))){
        S.loginSelected=S.rest;
      } else {
        S.loginErr='Selecione um restaurante da lista acima.';render();return;
      }
    }
    S.loginErr='';S.loginStep='request';render();
  }
  else if(a==='back-to-search'){S.loginStep='search';S.loginErr='';S.loginCode='';render();}
  else if(a==='submit-access'){
    const nameEl=document.getElementById('login-name'),codeEl=document.getElementById('login-code');
    const name=(nameEl?.value||S.loginName).trim();
    const code=(codeEl?.value||S.loginCode).trim().toUpperCase();
    S.loginName=name;S.loginCode=code;
    if(!name){S.loginErr='Digite seu nome completo.';render();return;}
    if(!code){S.loginErr='Digite o código de acesso.';render();return;}
    // Check if code matches a company
    const restId=S.loginSelected?.id||S.rest?.id;
    const targetRest=S.loginSelected||S.rest;
    if(!restId||!targetRest){S.loginErr='Restaurante não encontrado.';render();return;}
    // Load companies for that restaurant and check code
    if(db){
      db.collection(`mh/${restId}/companies`).get().then(snap=>{
        const companies=snap.docs.map(d=>({...d.data(),id:d.id}));
        const co=companies.find(c=>(c.code||'').toUpperCase()===code);
        if(!co){S.loginErr='Código inválido. Verifique com o administrador.';render();return;}
        // Code is valid — create user and log in
        S.rest={id:restId,...targetRest};
        S.companies=companies;
        localStorage.setItem('mh_rest',JSON.stringify(S.rest));
        S.user={id:genId(),name,company:co.name,companyId:co.id,role:'colaborador'};
        S.confirmName=name;
        localStorage.setItem('mh_user',JSON.stringify(S.user));
        fSet(`mh/${restId}/users/${S.user.id}`,S.user);
        startUserListeners(restId);startUserChat();
        S.screen='app';S.atab='home';
        S.loginCode='';S.loginName='';S.loginStep='search';S.loginErr='';
        render();
        showToast('👋','Bem-vindo!',`Olá ${name}! Você acessou o cardápio de ${S.rest.name}.`,null);
      }).catch(e=>{
        // Fallback: check local companies
        const co=S.companies.find(c=>(c.code||'').toUpperCase()===code);
        if(!co){S.loginErr='Código inválido. Verifique com o administrador.';render();return;}
        S.rest=S.rest||targetRest;
        S.user={id:genId(),name,company:co.name,companyId:co.id,role:'colaborador'};
        S.confirmName=name;
        localStorage.setItem('mh_user',JSON.stringify(S.user));
        if(db&&rid()){fSet(`mh/${rid()}/users/${S.user.id}`,S.user);startUserListeners(rid());startUserChat();}
        S.screen='app';S.atab='home';
        S.loginCode='';S.loginName='';S.loginStep='search';S.loginErr='';
        render();
      });
    } else {
      const co=S.companies.find(c=>(c.code||'').toUpperCase()===code);
      if(!co){S.loginErr='Código inválido. Verifique com o administrador.';render();return;}
      S.user={id:genId(),name,company:co.name,companyId:co.id,role:'colaborador'};
      S.confirmName=name;localStorage.setItem('mh_user',JSON.stringify(S.user));
      S.screen='app';S.atab='home';
      S.loginCode='';S.loginName='';S.loginStep='search';S.loginErr='';
      render();
    }
  }
  else if(a==='logout'){
    S.user=null;S.confirmName='';localStorage.removeItem('mh_user');
    S.chatMsgs=[];S.sel.clear();
    if(UNS.myChat){UNS.myChat();delete UNS.myChat;}
    S.screen='landing';render();
  }
  // Admin
  else if(a==='admin-submit'){
    const pass=document.getElementById('admin-pass')?.value||'';
    if(pass===S.adminPass){
      S.adminPassErr=false;S.isAdmin=true;localStorage.setItem('mh_isAdmin','1');
      if(!S.rest){S.screen='onboard';}else{S.screen='admin';S.atab='orders';}
      if(db&&S.rest?.id)startAdminListeners();render();
    }else{S.adminPassErr=true;render();const i=document.getElementById('admin-pass');if(i){i.value='';setTimeout(()=>i.focus(),50);}}
  }
  else if(a==='logout-admin'){S.isAdmin=false;localStorage.setItem('mh_isAdmin','');S.screen='landing';render();}
  // Onboard
  else if(a==='ob-back'){if(S.obStep>1){S.obStep--;render();}else{S.screen=S.isAdmin?'admin':'landing';render();}}
  else if(a==='ob-next'){
    if(S.obStep===1){
      const n=document.getElementById('ob-name'),sl=document.getElementById('ob-slogan');
      if(n)S.obName=n.value.trim();if(sl)S.obSlogan=sl.value.trim();
      if(!S.obName){alert('Digite o nome do restaurante.');return;}
      S.obStep=2;render();
    }else{
      S.rest={id:RESTAURANT_ID,name:S.obName,slogan:S.obSlogan,color:S.obColor,logo:S.obLogo||null};
      localStorage.setItem('mh_rest',JSON.stringify(S.rest));
      if(db){
        fSet(`mh/${S.rest.id}/config/main`,{name:S.rest.name,slogan:S.rest.slogan,color:S.rest.color,logo:S.rest.logo||null});
        fSet(`mh/${S.rest.id}/menu/data`,S.menu);
        startAdminListeners();
      }
      S.obLogo=null;
      S.isAdmin=true;localStorage.setItem('mh_isAdmin','1');
      S.screen='admin';S.atab='companies';render();
      alert('✅ Restaurante criado!\n\nAgora cadastre suas empresas na aba "Empresas" e compartilhe os códigos de acesso.');
    }
  }
  // Access requests
  else if(a.startsWith('approve-access-')){
    const id=a.replace('approve-access-','');
    const req=S.accessRequests.find(r=>r.id===id);if(!req)return;
    req.status='approved';
    const co=S.companies.find(c=>c.id===req.companyId);
    if(db&&rid()){
      db.doc(`mh/${rid()}/access_requests/${id}`).update({status:'approved'}).catch(()=>{});
      if(co){
        const uid=genId();
        const newUser={id:uid,name:req.userName,company:co.name,companyId:co.id,role:'colaborador'};
        fSet(`mh/${rid()}/users/${uid}`,newUser);
        // Also update local S.users immediately
        if(!S.users.find(u=>u.name===req.userName&&u.companyId===co.id))S.users.push(newUser);
      }
    }
    showToast('✅','Acesso aprovado!',`${req.userName} agora pode acessar o cardápio`,null);
    render();
  }
  else if(a.startsWith('reject-access-')){
    const id=a.replace('reject-access-','');
    if(confirm('Rejeitar esta solicitação?')){
      S.accessRequests=S.accessRequests.filter(r=>r.id!==id);
      if(db&&rid())db.doc(`mh/${rid()}/access_requests/${id}`).delete().catch(()=>{});
      render();
    }
  }
  // Orders
  else if(a==='open-order'){S.overlay='order';render();}
  else if(a==='confirm-order'){
    const n=document.getElementById('cn');if(n)S.confirmName=n.value;
    const ob=document.getElementById('cobs');if(ob)S.confirmObs=ob.value;
    S._cn=S.confirmName;S._cobs=S.confirmObs.trim();S._ci=new Set(S.sel);
    const todayIdx=new Date().getDay();
    const dayMenu=S.menu[S.meal]?.[todayIdx]||{};
    const items=[];Object.values(dayMenu).flat().forEach(it=>{if(S.sel.has(it.id))items.push(it.name);});
    const oid=genId();
    const now=new Date();
    const dateStr=`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
    const monthStr=`${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
    const order={id:oid,userId:S.user?.id||'',name:S.confirmName,company:S.user?.company||'—',companyId:S.user?.companyId||'',meal:S.meal==='almoco'?'Almoço':'Jantar',day:DAYSF[S.day],items:items.join(', '),obs:S.confirmObs.trim(),status:'confirmado',time:nowT(),date:dateStr,month:monthStr,isNew:true};
    S.orders.unshift(order);
    if(db&&rid()){db.doc(`mh/${rid()}/orders/${oid}`).set({...order,ts:firebase.firestore.FieldValue.serverTimestamp()}).catch(e=>console.warn(e));}
    S.sel.clear();S.confirmObs='';S.overlay='success';render();
  }
  else if(a.startsWith('cancel-')){
    const id=a.replace('cancel-','');const o=S.orders.find(x=>x.id===id);
    if(o&&confirm('Cancelar este pedido?')){o.status='cancelado';if(db&&rid())db.doc(`mh/${rid()}/orders/${id}`).update({status:'cancelado'}).catch(()=>{});render();}
  }
  else if(a.startsWith('view-order-')){
    const id=a.replace('view-order-','');const o=S.orders.find(x=>x.id===id);
    if(o){o.isNew=false;S.viewOrderId=id;S.overlay='order-detail';render();}
  }
  // Chat
  else if(a==='send-chat'){
    const inp=document.getElementById('chat-input');const text=(inp?.value||S.chatInput).trim();
    if(!text||!S.user)return;
    S.chatMsgs.push({id:genId(),text,from:'user',name:S.user.name,time:nowT(),read:true});S.chatInput='';render();
    if(db&&rid())sendChatMsg(S.user.id,text,'user',S.user.name);
  }
  else if(a.startsWith('open-thread-')){
    const uid=a.replace('open-thread-','');S.threadUid=uid;S.threadInput='';S.threadMsgs=[];
    if(db)listenThread(uid);render();
  }
  else if(a==='send-thread'){
    const inp=document.getElementById('thread-input');const text=(inp?.value||S.threadInput).trim();
    if(!text||!S.threadUid)return;
    S.threadMsgs.push({id:genId(),text,from:'rest',name:S.rest?.name||'Restaurante',time:nowT(),read:true});S.threadInput='';render();
    if(db&&rid())sendChatMsg(S.threadUid,text,'rest',S.rest?.name||'Restaurante');
  }
  // Menu
  else if(a==='open-add-item'){S.overlay='add-item';render();}
  else if(a==='save-item'){
    const cat=document.getElementById('ni-cat')?.value||S.newItemCat;
    const icon=document.getElementById('ni-icon')?.value||'🍽️';
    const name=document.getElementById('ni-name')?.value?.trim();
    const desc=document.getElementById('ni-desc')?.value||'';
    if(!name){alert('Digite o nome do item.');return;}
    const d=S.adminMenuDay;
    if(!S.menu[S.meal]) S.menu[S.meal]={};
    if(!S.menu[S.meal][d]) S.menu[S.meal][d]=buildEmptyDayCats(S.meal);
    if(!S.menu[S.meal][d][cat]) S.menu[S.meal][d][cat]=[];
    S.menu[S.meal][d][cat].push({id:'i'+genId(),icon,name,desc});
    if(db&&rid())fSet(`mh/${rid()}/menu/data`,S.menu);
    S.newItemName='';S.newItemDesc='';S.overlay=null;render();
  }
  else if(a==='clear-day'){
    if(confirm(`Limpar o cardápio de ${S.meal==='almoco'?'almoço':'jantar'} de ${DAYSF[S.adminMenuDay]}?`)){
      S.menu[S.meal][S.adminMenuDay]=buildEmptyDayCats(S.meal);
      if(db&&rid())fSet(`mh/${rid()}/menu/data`,S.menu);
      render();
    }
  }
  else if(a==='copy-day-modal'){S.overlay='copy-day';render();}
  else if(a==='do-copy-day'){
    const src=S.menu[S.meal][S.adminMenuDay];
    let count=0;
    for(let i=0;i<7;i++){
      if(i===S.adminMenuDay)continue;
      const cb=document.getElementById(`cp-day-${i}`);
      if(cb?.checked){
        S.menu[S.meal][i]=JSON.parse(JSON.stringify(src)); // deep copy
        count++;
      }
    }
    if(count===0){alert('Selecione ao menos um dia.');return;}
    if(db&&rid())fSet(`mh/${rid()}/menu/data`,S.menu);
    S.overlay=null;render();
    showToast('✅','Cardápio copiado!',`Copiado para ${count} dia${count>1?'s':''}`,null);
  }
  // Companies
  else if(a==='open-add-co'){S.newCoName='';S.newCoCode='';S.newCoIcon='🏢';S.newCoLogo=null;S.overlay='add-co';render();}
  else if(a==='save-co'){
    const icon=document.getElementById('co-icon')?.value||'🏢';
    const name=document.getElementById('co-name')?.value?.trim();
    const code=(document.getElementById('co-code')?.value||genCode(name||'')).toUpperCase().trim();
    if(!name){alert('Digite o nome da empresa.');return;}
    if(S.companies.some(c=>(c.code||'').toUpperCase()===code)){alert('Já existe uma empresa com esse código.');return;}
    const nc={id:genId(),icon,name,code,count:0,logo:S.newCoLogo||null};
    S.companies.push(nc);
    if(db&&rid())fSet(`mh/${rid()}/companies/${nc.id}`,nc);
    S.newCoLogo=null;S.overlay=null;render();
  }
  else if(a.startsWith('edit-co-')){S.editCoId=a.replace('edit-co-','');S.overlay='edit-co';render();}
  else if(a==='save-edit-co'){
    const co=S.companies.find(c=>c.id===S.editCoId);if(!co)return;
    const icon=document.getElementById('eco-icon')?.value||co.icon;
    const name=document.getElementById('eco-name')?.value?.trim()||co.name;
    const code=(document.getElementById('eco-code')?.value||co.code).toUpperCase().trim();
    co.icon=icon;co.name=name;co.code=code;
    // logo is already updated in-place by the FileReader listener
    if(db&&rid())fSet(`mh/${rid()}/companies/${co.id}`,co);
    S.editCoId=null;S.overlay=null;render();
  }
  else if(a==='remove-rest-logo'){
    if(S.rest){
      S.rest.logo=null;
      localStorage.setItem('mh_rest',JSON.stringify(S.rest));
      if(db&&rid())fSet(`mh/${rid()}/config/main`,{...S.rest});
      render();
    }
  }
  else if(a==='remove-ob-logo'){S.obLogo=null;render();}
  else if(a==='remove-eco-logo'){
    const co=S.companies.find(c=>c.id===S.editCoId);
    if(co){co.logo=null;render();}
  }
  else if(a.startsWith('del-co-')){
    const id=a.replace('del-co-','');const co=S.companies.find(c=>c.id===id);
    if(co&&confirm(`Excluir "${co.name}"?`)){S.companies=S.companies.filter(c=>c.id!==id);if(db&&rid())db.doc(`mh/${rid()}/companies/${id}`).delete().catch(()=>{});render();}
  }
  else if(a.startsWith('del-user-')){
    const id=a.replace('del-user-','');const u=S.users.find(x=>x.id===id);
    if(u&&confirm(`Excluir "${u.name}"?`)){S.users=S.users.filter(x=>x.id!==id);if(db&&rid())db.doc(`mh/${rid()}/users/${id}`).delete().catch(()=>{});render();}
  }
  // Settings
  else if(a==='save-cutoff'){
    const av=document.getElementById('cut-a')?.value,jv=document.getElementById('cut-j')?.value;
    if(av)S.cutoff.almoco=av;if(jv)S.cutoff.jantar=jv;alert('✅ Horários salvos!');render();
  }
  else if(a==='save-pass'){
    const np=document.getElementById('new-pass')?.value||'',cp=document.getElementById('conf-pass')?.value||'';
    if(np.length<4){alert('Mínimo 4 caracteres.');return;}
    if(np!==cp){alert('Senhas não coincidem.');return;}
    S.adminPass=np;localStorage.setItem('mh_adminpass',np);alert('✅ Senha alterada!');
  }
  else if(a==='export-resumo'){
    const r=S.rest||{name:'Restaurante'};
    const ativos=S.orders.filter(o=>o.status!=='cancelado');
    const isDiario=S.resumoView==='diario';

    // ── Base de dados conforme visão ──
    let base, tituloVista;
    if(isDiario){
      const selDate=S.resumoDate||'';
      const isOldDay=selDate&&!selDate.includes('/');
      base=selDate
        ?(isOldDay
            ?ativos.filter(o=>!o.date&&o.day===selDate)
            :ativos.filter(o=>o.date===selDate))
        :ativos;
      const selLabel=selDate.length===10?formatDateLabel(selDate):selDate||'Todos';
      tituloVista=`Resumo Diário — ${selLabel}`;
    } else {
      base=ativos;
      tituloVista='Resumo Geral de Itens';
    }
    const filtrados=S.resumoMeal==='todos'?base:base.filter(o=>o.meal===S.resumoMeal);

    // ── Itens consolidados ──
    const totalItems={};
    filtrados.forEach(o=>{
      (o.items||'').split(',').map(i=>i.trim()).filter(Boolean).forEach(item=>{
        const clean=item.replace(/^[\p{Emoji}\s]+/u,'').trim()||item;
        if(!totalItems[clean]) totalItems[clean]={count:0,original:item,meals:{}};
        totalItems[clean].count++;
        totalItems[clean].meals[o.meal]=(totalItems[clean].meals[o.meal]||0)+1;
      });
    });
    const sortedItems=Object.entries(totalItems).sort((a,b)=>b[1].count-a[1].count);

    // ── Contagem por data ──
    const byDate={};
    filtrados.forEach(o=>{
      const k=o.date||o.day||'Sem data';
      if(!byDate[k]) byDate[k]={total:0,almoco:0,jantar:0,mes:o.month||''};
      byDate[k].total+=orderQty(o);
      if(o.meal==='Almoço') byDate[k].almoco+=orderQty(o);
      else byDate[k].jantar+=orderQty(o);
    });
    const sortedDates=Object.keys(byDate).sort((a,b)=>{
      const p=s=>{const q=s.split('/');return q.length===3?new Date(q[2],q[1]-1,q[0]):new Date(0);};
      return p(a)-p(b);
    });

    // ── Contagem por mês ──
    const byMonth={};
    filtrados.forEach(o=>{
      const k=o.month||'Sem mês';
      if(!byMonth[k]) byMonth[k]={total:0,almoco:0,jantar:0};
      byMonth[k].total++;
      if(o.meal==='Almoço') byMonth[k].almoco++;
      else byMonth[k].jantar++;
    });

    const totalAlmoco=filtrados.filter(o=>o.meal==='Almoço').length;
    const totalJantar=filtrados.filter(o=>o.meal==='Jantar').length;

    const itemRows=sortedItems.map(([,d],i)=>
      `<tr><td>${i+1}</td><td>${esc(d.original)}</td><td style="text-align:center;font-weight:700">${d.count}</td><td style="text-align:center">${d.meals['Almoço']||0}</td><td style="text-align:center">${d.meals['Jantar']||0}</td></tr>`
    ).join('');

    const dateRows=sortedDates.map(d=>{
      const v=byDate[d];
      const label=d.length===10?formatDateLabel(d):d;
      return`<tr><td>${esc(label)}</td><td style="text-align:center;font-weight:700">${v.total}</td><td style="text-align:center;color:#C8901A">${v.almoco}</td><td style="text-align:center;color:#1A3A6B">${v.jantar}</td></tr>`;
    }).join('');

    const monthRows=Object.entries(byMonth).sort((a,b)=>{
      const p=s=>{const q=s.split('/');return q.length===2?new Date(q[1],q[0]-1):new Date(0);};
      return p(a[0])-p(b[0]);
    }).map(([m,v])=>
      `<tr><td>${esc(m)}</td><td style="text-align:center;font-weight:700">${v.total}</td><td style="text-align:center;color:#C8901A">${v.almoco}</td><td style="text-align:center;color:#1A3A6B">${v.jantar}</td></tr>`
    ).join('');

    const restLogo=r.logo?`<img src="${r.logo}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;margin-right:14px;vertical-align:middle"/>`:'';

    const htmlOut=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
    <title>${esc(tituloVista)} — ${esc(r.name)}</title>
    <style>
      *{box-sizing:border-box}
      body{font-family:'Segoe UI',Arial,sans-serif;padding:28px;color:#1A1208;max-width:800px;margin:0 auto;font-size:13px}
      .rest-header{background:#1A1208;color:#FBF7EE;border-radius:8px;padding:16px 20px;display:flex;align-items:center;margin-bottom:20px}
      .rest-name{font-size:20px;font-weight:700}
      .rest-sub{font-size:11px;opacity:.65;margin-top:3px}
      h2{font-size:14px;font-weight:700;margin:20px 0 8px;padding-bottom:5px;border-bottom:2px solid #C8901A;color:#1A1208;text-transform:uppercase;letter-spacing:.5px}
      .summary{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
      .sum-box{background:#F5EFE0;border-radius:8px;padding:12px 18px;text-align:center;min-width:100px}
      .sum-val{font-size:26px;font-weight:700}
      .sum-lbl{font-size:11px;color:#5C4A30;margin-top:2px}
      table{width:100%;border-collapse:collapse;margin-bottom:4px}
      th{background:#1A1208;color:#FBF7EE;padding:8px 12px;text-align:left;font-size:11.5px}
      td{padding:7px 12px;border-bottom:1px solid #E8E0D0;font-size:12.5px}
      tr:nth-child(even) td{background:#FDFAF5}
      .btn{margin-top:20px;padding:10px 22px;background:#1A1208;color:#FBF7EE;border:none;border-radius:8px;font-size:14px;cursor:pointer;display:block}
      @media print{.btn{display:none}body{padding:14px}}
    </style></head>
    <body>

    <!-- Cabeçalho restaurante -->
    <div class="rest-header">
      ${restLogo}
      <div>
        <div class="rest-name">${esc(r.name)}</div>
        <div class="rest-sub">${esc(tituloVista)} · Gerado em ${new Date().toLocaleDateString('pt-BR')} às ${nowT()}</div>
      </div>
    </div>

    <!-- Totais gerais -->
    <h2>📊 Totais gerais</h2>
    <div class="summary">
      <div class="sum-box"><div class="sum-val">${filtrados.length}</div><div class="sum-lbl">Total refeições</div></div>
      <div class="sum-box"><div class="sum-val" style="color:#C8901A">${totalAlmoco}</div><div class="sum-lbl">☀️ Almoços</div></div>
      <div class="sum-box"><div class="sum-val" style="color:#1A3A6B">${totalJantar}</div><div class="sum-lbl">🌙 Jantares</div></div>
    </div>

    <!-- Por mês -->
    ${Object.keys(byMonth).length>1?`
    <h2>📆 Refeições por mês</h2>
    <table>
      <thead><tr><th>Mês</th><th style="text-align:center">Total</th><th style="text-align:center">☀️ Almoços</th><th style="text-align:center">🌙 Jantares</th></tr></thead>
      <tbody>${monthRows}</tbody>
    </table>`:''}

    <!-- Por data -->
    <h2>📅 Refeições por data</h2>
    <table>
      <thead><tr><th>Data</th><th style="text-align:center">Total</th><th style="text-align:center">☀️ Almoços</th><th style="text-align:center">🌙 Jantares</th></tr></thead>
      <tbody>${dateRows||'<tr><td colspan="4" style="text-align:center;color:#999">Sem dados</td></tr>'}</tbody>
    </table>

    <!-- Itens por refeição -->
    <h2>🍽️ Itens mais pedidos</h2>
    <table>
      <thead><tr><th>#</th><th>Item</th><th style="text-align:center">Total</th><th style="text-align:center">☀️ Almoço</th><th style="text-align:center">🌙 Jantar</th></tr></thead>
      <tbody>${itemRows||'<tr><td colspan="5" style="text-align:center;color:#999">Sem dados</td></tr>'}</tbody>
    </table>

    <button class="btn" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
    </body></html>`;
    const w=window.open('','_blank');if(w){w.document.write(htmlOut);w.document.close();setTimeout(()=>w.print(),600);}
  }
  else if(a==='open-retro'){
    S.overlay=null;
    abrirRetroDialog();
  }
  else if(a==='confirm-retro'){
    const dateEl=document.getElementById('retro-date');
    const dateInputVal=dateEl?.value||S.retroDate||'';
    if(!dateInputVal){alert('Selecione uma data.');return;}
    const dateStr=inputValToDateStr(dateInputVal);
    if(!dateStr){alert('Data inválida: '+dateInputVal);return;}
    const parsedDate=parseDateStr(dateStr);
    const monthStr=`${String(parsedDate.getMonth()+1).padStart(2,'0')}/${parsedDate.getFullYear()}`;
    const dayName=DAYSF[parsedDate.getDay()];

    const inputs=document.querySelectorAll('.retro-input');
    if(inputs.length===0){alert('Inputs não encontrados. Tente fechar e abrir o modal novamente.');return;}

    let count=0;
    const newOrders=[];
    const vals={};
    inputs.forEach(el=>{
      const idx=parseInt(el.dataset.retroidx);
      const meal=el.dataset.retromeal;
      const v=parseInt(el.value)||0;
      if(!vals[idx]) vals[idx]={almoco:0,jantar:0};
      vals[idx][meal]=v;
    });

    S.companies.forEach((co,idx)=>{
      const row=vals[idx]||{almoco:0,jantar:0};
      const almoco=row.almoco||0;
      const jantar=row.jantar||0;
      if(almoco>0){
        const oid=genId();
        newOrders.push({
          id:oid,userId:'admin-retro',
          name:`${almoco} refeição${almoco>1?'s':''} — ${co.name}`,
          company:co.name,companyId:co.id,
          meal:'Almoço',day:dayName,
          items:`${almoco} almoço${almoco>1?'s':''}`,
          obs:`Lançamento retroativo · ${almoco} pessoa${almoco>1?'s':''}`,
          status:'confirmado',time:'00:00',
          date:dateStr,month:monthStr,
          isNew:false,avulso:true,retro:true,qty:almoco
        });
        count+=almoco;
      }
      if(jantar>0){
        const oid=genId();
        newOrders.push({
          id:oid,userId:'admin-retro',
          name:`${jantar} refeição${jantar>1?'s':''} — ${co.name}`,
          company:co.name,companyId:co.id,
          meal:'Jantar',day:dayName,
          items:`${jantar} jantar${jantar>1?'s':''}`,
          obs:`Lançamento retroativo · ${jantar} pessoa${jantar>1?'s':''}`,
          status:'confirmado',time:'00:00',
          date:dateStr,month:monthStr,
          isNew:false,avulso:true,retro:true,qty:jantar
        });
        count+=jantar;
      }
    });

    if(count===0){alert('Todos os valores estão zerados. Preencha almoços ou jantares.');return;}

    newOrders.forEach(order=>{
      S.orders.unshift(order);
      if(db&&rid()){
        db.doc(`mh/${rid()}/orders/${order.id}`)
          .set({...order,ts:firebase.firestore.FieldValue.serverTimestamp()})
          .catch(e=>console.warn('Firebase erro:',e));
      }
    });
    S.retroRows=[];S.overlay=null;render();
    showToast('✅','Lançamento retroativo salvo!',`${count} refeição${count>1?'s':''} em ${dateStr}`,null);
  }
  else if(a==='open-avulso'){
    S.avulsoName='';S.avulsoCompanyId=S.companies[0]?.id||'';
    S.avulsoMeal='almoco';S.avulsoDay=new Date().getDay();
    S.avulsoObs='';S.avulsoSel=new Set();S.avulsoDate='';S.avulsoItemsManual='';
    S.overlay='avulso';render();
  }
  else if(a==='confirm-avulso'){
    const nameEl=document.getElementById('avulso-name');
    const compEl=document.getElementById('avulso-company');
    const obsEl=document.getElementById('avulso-obs');
    const dateEl=document.getElementById('avulso-date');
    const manualEl=document.getElementById('avulso-items-manual');
    const name=(nameEl?.value||S.avulsoName).trim();
    const companyId=compEl?.value||S.avulsoCompanyId;
    const obs=obsEl?.value||S.avulsoObs;
    const manualItems=(manualEl?.value||S.avulsoItemsManual||'').trim();
    if(!name){alert('Digite o nome da pessoa.');return;}
    if(!companyId){alert('Selecione a empresa.');return;}
    const co=S.companies.find(c=>c.id===companyId);
    const cats=S.menu[S.avulsoMeal]?.[S.avulsoDay]||{};
    // Itens do cardápio selecionados
    const itemsFromMenu=[];
    Object.values(cats).flat().forEach(it=>{if(S.avulsoSel.has(it.id))itemsFromMenu.push(it.name);});
    // Combinar com itens manuais
    const allItems=[
      ...itemsFromMenu,
      ...manualItems.split(',').map(i=>i.trim()).filter(Boolean)
    ];
    if(allItems.length===0){alert('Selecione itens do cardápio ou digite os itens manualmente.');return;}
    // Data: usa a data do campo, ou hoje
    const dateInputVal=dateEl?.value||S.avulsoDate||dateToInput(todayStr());
    const dateStr=inputValToDateStr(dateInputVal)||todayStr();
    const parsedDate=parseDateStr(dateStr);
    const monthStr=`${String(parsedDate.getMonth()+1).padStart(2,'0')}/${parsedDate.getFullYear()}`;
    const dayOfWeek=DAYSF[parsedDate.getDay()];
    const oid=genId();
    const order={
      id:oid,userId:'admin-avulso',name,
      company:co?.name||'',companyId,
      meal:S.avulsoMeal==='almoco'?'Almoço':'Jantar',
      day:dayOfWeek,
      items:allItems.join(', '),obs:obs.trim(),
      status:'confirmado',time:nowT(),
      date:dateStr,month:monthStr,
      isNew:true,avulso:true
    };
    S.orders.unshift(order);
    if(db&&rid()){
      db.doc(`mh/${rid()}/orders/${oid}`).set({...order,ts:firebase.firestore.FieldValue.serverTimestamp()}).catch(e=>console.warn(e));
    }
    S.avulsoSel=new Set();S.avulsoName='';S.avulsoObs='';S.avulsoItemsManual='';S.avulsoDate='';
    S.overlay=null;render();
    showToast('✅','Pedido lançado!',`${name} · ${co?.name||''} · ${dateStr} · ${S.avulsoMeal==='almoco'?'Almoço':'Jantar'}`,null);
  }
  else if(a==='open-pdf'){S.pdfDateFrom='';S.pdfDateTo='';S.overlay='pdf';render();}
  else if(a==='pdf-period-all'){S.pdfDateFrom='';S.pdfDateTo='';render();}
  else if(a.startsWith('pdf-period-month-')){
    const m=a.replace('pdf-period-month-',''); // MM/YYYY
    const parts=m.split('/');
    if(parts.length===2){
      const mm=parts[0],yyyy=parts[1];
      const lastDay=new Date(parseInt(yyyy),parseInt(mm),0).getDate();
      S.pdfDateFrom=`01/${mm}/${yyyy}`;
      S.pdfDateTo=`${String(lastDay).padStart(2,'0')}/${mm}/${yyyy}`;
    }
    render();
  }
  else if(a==='download-pdf'){
    const r=S.rest||{name:'Restaurante'};

    // ── Período ──
    const fromRaw=document.getElementById('pdf-from')?.value;
    const toRaw=document.getElementById('pdf-to')?.value;
    const fromStr=fromRaw?inputValToDateStr(fromRaw):(S.pdfDateFrom||'');
    const toStr=toRaw?inputValToDateStr(toRaw):(S.pdfDateTo||'');
    const hasFilter=!!(fromStr||toStr);
    const fromDate=fromStr?parseDateStr(fromStr):new Date(0);
    const toDate=toStr?parseDateStr(toStr):new Date(9999,11,31);
    const periodLabel=fromStr&&toStr?`${fromStr} a ${toStr}`:fromStr?`A partir de ${fromStr}`:toStr?`Até ${toStr}`:'Todos os períodos';

    // ── Filtrar: SEM cancelados ──
    // Pedidos sem data (antigos) sempre incluídos quando sem filtro de período
    const filtered=S.orders.filter(o=>{
      if(o.status==='cancelado') return false;
      if(!o.date) return !hasFilter; // sem data: só inclui quando não há filtro de período
      const d=parseDateStr(o.date);
      return d>=fromDate && d<=toDate;
    });

    // ── Totais gerais ──
    const totalAlmoco=filtered.filter(o=>o.meal==='Almoço').reduce((s,o)=>s+orderQty(o),0);
    const totalJantar=filtered.filter(o=>o.meal==='Jantar').reduce((s,o)=>s+orderQty(o),0);

    // ── Cabeçalho do restaurante ──
    const restLogo=r.logo
      ?`<img src="${r.logo}" style="width:64px;height:64px;object-fit:cover;border-radius:10px;margin-right:16px;flex-shrink:0"/>`
      :`<div style="width:64px;height:64px;border-radius:10px;background:#1A1208;display:flex;align-items:center;justify-content:center;font-size:30px;margin-right:16px;flex-shrink:0">🍽️</div>`;

    const restHeader=`
      <div style="display:flex;align-items:center;padding:20px 24px;background:#1A1208;color:#FBF7EE;border-radius:10px;margin-bottom:6px">
        ${restLogo}
        <div style="flex:1">
          <div style="font-size:22px;font-weight:700;font-family:Georgia,serif">${esc(r.name)}</div>
          ${r.slogan?`<div style="font-size:12px;opacity:.7;margin-top:3px">${esc(r.slogan)}</div>`:''}
        </div>
        <div style="text-align:right;font-size:11px;opacity:.65;line-height:1.7">
          <div><b>Relatório de Refeições</b></div>
          <div>Período: ${esc(periodLabel)}</div>
          <div>Gerado em ${new Date().toLocaleDateString('pt-BR')} às ${nowT()}</div>
        </div>
      </div>`;

    // ── Agrupar por empresa ──
    const byCompany={};
    filtered.forEach(o=>{
      const co=o.company||'Sem empresa';
      if(!byCompany[co]) byCompany[co]=[];
      byCompany[co].push(o);
    });
    const sortedCompanies=Object.keys(byCompany).sort();

    // ── Seção de cada empresa ──
    const companySections=sortedCompanies.map(co=>{
      const list=byCompany[co];
      const coAlmoco=list.filter(o=>o.meal==='Almoço').reduce((s,o)=>s+orderQty(o),0);
      const coJantar=list.filter(o=>o.meal==='Jantar').reduce((s,o)=>s+orderQty(o),0);
      const coTotal=coAlmoco+coJantar;

      // Funcionários cadastrados desta empresa (de S.users/S.companies)
      const coObj=S.companies.find(c=>c.name===co);
      const coLogo=coObj?.logo
        ?`<img src="${coObj.logo}" style="width:36px;height:36px;object-fit:cover;border-radius:7px;margin-right:10px;vertical-align:middle"/>`
        :`<span style="font-size:20px;margin-right:8px">${coObj?.icon||'🏢'}</span>`;
      const cadUsers=S.users.filter(u=>u.company===co);
      const cadNames=cadUsers.length>0
        ?cadUsers.map(u=>esc(u.name)).join(' · ')
        :'—';

      // Agrupar por data
      const coByDate={};
      list.forEach(o=>{
        const k=o.date||o.day||'Sem data';
        if(!coByDate[k]) coByDate[k]=[];
        coByDate[k].push(o);
      });
      const coDates=Object.keys(coByDate).sort((a,b)=>{
        const p=s=>{const q=s.split('/');return q.length===3?new Date(q[2],q[1]-1,q[0]):new Date(0);};
        return p(a)-p(b);
      });

      const dailyRows=coDates.map(d=>{
        const dl=coByDate[d];
        const da=dl.filter(o=>o.meal==='Almoço').reduce((s,o)=>s+orderQty(o),0);
        const dj=dl.filter(o=>o.meal==='Jantar').reduce((s,o)=>s+orderQty(o),0);
        const label=d.length===10?formatDateLabel(d):d;
        return`<tr>
          <td>${esc(label)}</td>
          <td style="text-align:center;font-weight:700">${dl.length}</td>
          <td style="text-align:center;color:#C8901A;font-weight:600">${da}</td>
          <td style="text-align:center;color:#1A3A6B;font-weight:600">${dj}</td>
        </tr>`;
      }).join('');

      return`
        <div class="co-section">
          <!-- Nome da empresa -->
          <div class="co-header">
            <div style="display:flex;align-items:center">
              ${coLogo}
              <span class="co-name">${esc(co)}</span>
            </div>
            <span class="co-meta">Período: ${esc(periodLabel)}</span>
          </div>

          <!-- Funcionários cadastrados -->
          <div style="padding:9px 16px;background:#FDFAF5;border-bottom:1px solid #e0d8c8;font-size:12px;color:#5C4A30">
            <span style="font-weight:700;color:#1A1208">👥 Funcionários cadastrados:</span> ${cadNames}
          </div>

          <!-- Totais mensais da empresa -->
          <div class="summary">
            <div class="sum-box sum-total">
              <div class="sum-val">${coTotal}</div>
              <div class="sum-lbl">Total refeições</div>
            </div>
            <div class="sum-box sum-almoco">
              <div class="sum-val">${coAlmoco}</div>
              <div class="sum-lbl">☀️ Almoços</div>
            </div>
            <div class="sum-box sum-jantar">
              <div class="sum-val">${coJantar}</div>
              <div class="sum-lbl">🌙 Jantares</div>
            </div>
          </div>

          <!-- Pedidos por dia -->
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th style="text-align:center;width:55px">Total</th>
                <th style="text-align:center;width:65px">☀️ Almoço</th>
                <th style="text-align:center;width:65px">🌙 Jantar</th>
              </tr>
            </thead>
            <tbody>
              ${dailyRows||'<tr><td colspan="4" style="text-align:center;color:#999;padding:12px">Nenhum pedido</td></tr>'}
              <tr class="total-row">
                <td><b>TOTAL</b></td>
                <td style="text-align:center"><b>${coTotal}</b></td>
                <td style="text-align:center"><b>${coAlmoco}</b></td>
                <td style="text-align:center"><b>${coJantar}</b></td>
              </tr>
            </tbody>
          </table>
        </div>`;
    }).join('');

    // ── HTML final ──
    const htmlOut=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
    <title>Relatório — ${esc(r.name)}</title>
    <style>
      *{box-sizing:border-box}
      body{font-family:'Segoe UI',Arial,sans-serif;padding:28px;color:#1A1208;max-width:960px;margin:0 auto;font-size:13px}
      /* Empresa */
      .co-section{margin-bottom:28px;border:1px solid #e0d8c8;border-radius:8px;overflow:hidden;page-break-inside:avoid}
      .co-header{background:#2C2010;color:#FBF7EE;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
      .co-name{font-size:15px;font-weight:700}
      .co-meta{font-size:11px;opacity:.65}
      /* Totais mensais */
      .summary{display:flex;gap:0;border-bottom:1px solid #e0d8c8}
      .sum-box{flex:1;padding:14px 16px;text-align:center;border-right:1px solid #e0d8c8}
      .sum-box:last-child{border-right:none}
      .sum-val{font-size:28px;font-weight:700;line-height:1}
      .sum-lbl{font-size:11px;color:#5C4A30;margin-top:4px}
      .sum-total .sum-val{color:#1A1208}
      .sum-almoco .sum-val{color:#C8901A}
      .sum-jantar .sum-val{color:#1A3A6B}
      /* Tabela por dia */
      table{width:100%;border-collapse:collapse}
      th{background:#F5EFE0;color:#1A1208;padding:8px 12px;text-align:left;font-size:11.5px;font-weight:700;border-bottom:2px solid #C8901A}
      td{padding:7px 12px;border-bottom:1px solid #EDE5D5;font-size:12px;vertical-align:top}
      tr:nth-child(even) td{background:#FDFAF5}
      .total-row td{background:#F0E8D0;font-size:12.5px;border-top:2px solid #C8901A;border-bottom:none}
      /* Rodapé geral */
      .grand-total{background:#1A1208;color:#FBF7EE;border-radius:8px;padding:18px 22px;margin-top:24px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
      .gt-item{text-align:center}
      .gt-val{font-size:26px;font-weight:700;line-height:1}
      .gt-lbl{font-size:10px;opacity:.65;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
      .btn{margin-top:20px;padding:10px 22px;background:#1A1208;color:#FBF7EE;border:none;border-radius:8px;font-size:14px;cursor:pointer;display:block}
      @media print{.btn{display:none}body{padding:14px}
        .co-section{page-break-inside:avoid;margin-bottom:18px}}
    </style></head>
    <body>

      ${restHeader}

      ${companySections||'<p style="text-align:center;color:#999;padding:40px">Nenhum pedido no período selecionado.</p>'}

      <!-- TOTAL GERAL -->
      ${filtered.length>0?`
      <div class="grand-total">
        <div class="gt-item"><div class="gt-val">${filtered.reduce((s,o)=>s+orderQty(o),0)}</div><div class="gt-lbl">Total Geral</div></div>
        <div class="gt-item"><div class="gt-val">${totalAlmoco}</div><div class="gt-lbl">☀️ Almoços</div></div>
        <div class="gt-item"><div class="gt-val">${totalJantar}</div><div class="gt-lbl">🌙 Jantares</div></div>
        <div class="gt-item"><div class="gt-val">${sortedCompanies.length}</div><div class="gt-lbl">Empresas</div></div>
        <div style="flex:1"></div>
        <div style="text-align:right;font-size:11px;opacity:.6;line-height:1.8">
          <div>${esc(periodLabel)}</div>
          <div>Gerado em ${new Date().toLocaleDateString('pt-BR')} às ${nowT()}</div>
        </div>
      </div>`:''}

      <button class="btn" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
    </body></html>`;

    const w=window.open('','_blank');
    if(w){w.document.write(htmlOut);w.document.close();setTimeout(()=>w.print(),700);}
    S.overlay=null;render();
  }
}

  document.querySelectorAll('.mobile-bnav').forEach(e=>e.remove());
  const unreadChat=S.screen==='app'
    ?S.chatMsgs.filter(m=>m.from==='rest'&&!m.read).length
    :S.chatList.reduce((a,c)=>a+(c.unread||0),0);
  const newOrders =S.screen==='admin'?S.orders.filter(o=>o.isNew&&o.status!=='cancelado').length:0;
  const pendingAcc=S.screen==='admin'?S.accessRequests.filter(r=>r.status==='pending').length:0;
  const tabs=S.screen==='app'
    ?[{id:'home',ic:'🏠',lb:'Cardápio'},{id:'orders',ic:'🧾',lb:'Pedidos'},{id:'chat',ic:'💬',lb:'Chat',badge:unreadChat},{id:'profile',ic:'👤',lb:'Perfil'}]
    :[{id:'orders',ic:'📋',lb:'Pedidos',badge:newOrders},{id:'resumo',ic:'📊',lb:'Resumo'},{id:'menu',ic:'🍽️',lb:'Cardápio'},{id:'companies',ic:'🏢',lb:'Empresas'},{id:'access',ic:'🔑',lb:'Acessos',badge:pendingAcc},{id:'chats',ic:'💬',lb:'Chats',badge:unreadChat},{id:'settings',ic:'⚙️',lb:'Config'}];
  const nav=document.createElement('div');
  nav.className='mobile-bnav';
  nav.innerHTML=tabs.map(t=>`

      ${(t.badge||0)>0?`<span class="bn-badge">${t.badge}</span>`:''}

  document.body.appendChild(nav);
}

// ═══ SERVICE WORKER (cache offline) ═══
if('serviceWorker' in navigator){
  const sw=`
const CACHE='mh-v1';
const SHELL=['https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap'];
self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(CACHE).then(c=>c.addAll(SHELL)).catch(()=>{}));});
self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET'||e.request.url.includes('firestore'))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(res.ok&&(e.request.url.includes('fonts.googleapis')||e.request.url.includes('fonts.gstatic'))){
      const cl=res.clone();caches.open(CACHE).then(c=>c.put(e.request,cl));
    }
    return res;
  }).catch(()=>new Response('',{status:408}))));
});`;
  try{
    const blob=new Blob([sw],{type:'text/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  }catch(e){}
}

  ativo: true,
  falando: false,
  _voicePT: null,

  // Carrega a voz em português
  init(){
    if(!this.synth) return;
    const set=()=>{
      const voices=this.synth.getVoices();
      this._voicePT=
        voices.find(v=>v.lang==='pt-BR') ||
        voices.find(v=>v.lang.startsWith('pt')) ||
        voices[0] || null;
    };
    set();
    if(this.synth.onvoiceschanged!==undefined) this.synth.onvoiceschanged=set;
  },

  falar(texto, prioridade=false){
    if(!this.synth||!this.ativo) return;
    if(prioridade) this.synth.cancel();
    if(this.falando && !prioridade) return;
    const utter=new SpeechSynthesisUtterance(texto);
    utter.lang='pt-BR';
    utter.rate=0.95;
    utter.pitch=1.05;
    utter.volume=1;
    if(this._voicePT) utter.voice=this._voicePT;
    utter.onstart=()=>{ this.falando=true; };
    utter.onend=()=>{ this.falando=false; };
    utter.onerror=()=>{ this.falando=false; };
    this.synth.speak(utter);
  },

  saudacao(){
    const h=new Date().getHours();
    const nome=S.user?.name?.split(' ')[0]||'';
    let saud= h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
    const msg=nome?`${saud}, ${nome}! Bem-vindo ao cardápio. Selecione os itens do seu pedido.`
                  :`${saud}! Bem-vindo ao cardápio. Selecione os itens do seu pedido.`;
    setTimeout(()=>this.falar(msg, true), 800);
  },

  itemSelecionado(nome){
    this.falar(nome, false);
  },

  itemRemovido(nome){
    this.falar(`${nome} removido`, false);
  },

  confirmarPedido(qtd){
    const txt=qtd===1
      ?`Você selecionou 1 item. Deseja confirmar o pedido?`
      :`Você selecionou ${qtd} itens. Deseja confirmar o pedido?`;
    this.falar(txt, true);
  },

  pedidoConfirmado(nome){
    const primNome=nome?.split(' ')[0]||'';
    const h=new Date().getHours();
    const refei=h<15?'almoço':'jantar';
    const msg=primNome
      ?`Pedido confirmado, ${primNome}! Bom ${refei} e bom apetite!`
      :`Pedido confirmado! Bom ${refei} e bom apetite!`;
    setTimeout(()=>this.falar(msg, true), 400);
  }
};

VOZ.init();

// Hook: toca saudação ao entrar no app
const _origRender=window.render||render;
window.render=function(){
  const prevScreen=S._lastScreen;
  _origRender();
  injectMobileNav();
  if(S.screen==='app' && prevScreen!=='app'){
    VOZ.saudacao();
  }
  S._lastScreen=S.screen;
};

// Hook: voz nos itens do cardápio — rebind após cada render
const _origBindEvents=bindEvents;
bindEvents=function(){
  _origBindEvents();
  // Re-bind data-item com leitura de voz
  document.querySelectorAll('[data-item]').forEach(el=>{
    const fresh=el.cloneNode(true);
    if(el.parentNode) el.parentNode.replaceChild(fresh,el);
    fresh.addEventListener('click',()=>{
      const id=fresh.dataset.item;
      // Busca o nome do item em todos os dias do cardápio atual
      let nome='';
      const todayIdx=new Date().getDay();
      const dayMenu=S.menu[S.meal]?.[todayIdx]||{};
      Object.values(dayMenu).flat().forEach(it=>{
        if(it.id===id) nome=it.name.replace(/^[\p{Emoji}\s]+/u,'').trim()||it.name;
      });
      // Fallback: busca em todos os dias se não encontrou hoje
      if(!nome){
        Object.values(S.menu[S.meal]||{}).forEach(dayObj=>{
          if(typeof dayObj==='object' && !Array.isArray(dayObj)){
            Object.values(dayObj).flat().forEach(it=>{
              if(it.id===id) nome=it.name.replace(/^[\p{Emoji}\s]+/u,'').trim()||it.name;
            });
          }
        });
      }
      if(S.sel.has(id)){S.sel.delete(id);if(nome)VOZ.itemRemovido(nome);}
      else{S.sel.add(id);if(nome)VOZ.itemSelecionado(nome);}
      render();
    });
  });
  // Voz ao abrir modal de confirmação
  const btnOpenOrder=document.querySelector('[data-act="open-order"]');
  if(btnOpenOrder){
    btnOpenOrder.addEventListener('click',()=>{
      setTimeout(()=>VOZ.confirmarPedido(S.sel.size),300);
    },{once:true});
  }
  // Voz ao confirmar pedido
  const btnConfirm=document.querySelector('[data-act="confirm-order"]');
  if(btnConfirm){
    btnConfirm.addEventListener('click',()=>{
      setTimeout(()=>VOZ.pedidoConfirmado(S._cn||S.confirmName),600);
    },{once:true});
  }
};

// Trigger after override
window.render();
</script>
